<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Laptop Migration – Display</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
.stage{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden}
.slide{position:absolute;inset:0;width:100%;height:100%;border:none;opacity:0;pointer-events:none;background:#000}
.slide.visible{opacity:1;pointer-events:auto}
.curtain{position:fixed;inset:0;background:#000;opacity:0;z-index:100;pointer-events:none;transition:opacity 0.7s ease}
.curtain.closing{opacity:1}
.curtain.opening{opacity:0}
.progress-bar{position:fixed;bottom:0;left:0;height:3px;width:0%;background:linear-gradient(90deg,#00D4E8,#73F3FF);z-index:200;box-shadow:0 0 8px rgba(0,212,232,0.6);transition:none}
.counter{position:fixed;bottom:18px;right:28px;z-index:200;display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.15);transition:all 0.5s ease}
.dot.active{background:#00D4E8;border-color:#00D4E8;box-shadow:0 0 8px rgba(0,212,232,0.7);transform:scale(1.3)}
.slide-label{position:fixed;bottom:14px;left:28px;z-index:200;font-family:'Courier New',monospace;font-size:12px;letter-spacing:0.14em;color:rgba(255,255,255,0.2);text-transform:uppercase}
</style>
</head>
<body>

<div class="stage">
  <iframe class="slide visible" id="s0" src="slide1.html"></iframe>
  <iframe class="slide"         id="s1" src="slide2.html"></iframe>
  <iframe class="slide"         id="s2" src="slide3.html"></iframe>
  <iframe class="slide"         id="s3" src="slide4.html"></iframe>
</div>

<div class="curtain" id="curtain"></div>
<div class="progress-bar" id="progressBar"></div>
<div class="counter" id="counter"></div>
<div class="slide-label" id="slideLabel"></div>

<script>
  const DURATIONS = [5000, 5000, 9000, 5000];
  const FADE = 700;

  const slides      = document.querySelectorAll('.slide');
  const curtain     = document.getElementById('curtain');
  const bar         = document.getElementById('progressBar');
  const counter     = document.getElementById('counter');
  const label       = document.getElementById('slideLabel');

  const labels = [
    'Slide 01 — Migration Overview',
    'Slide 02 — Prepare Before Your Migration Date',
    'Slide 03 — Tonight at 7 PM — Do This',
    'Slide 04 — IT Support',
  ];

  let current = 0;

  /* Build dots */
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.id = 'dot-' + i;
    counter.appendChild(d);
  });

  function setLabel(i) { label.textContent = labels[i] || ''; }

  function startProgress(duration) {
    bar.style.transition = 'none';
    bar.style.width = '0%';
    void bar.offsetWidth;
    bar.style.transition = `width ${duration}ms linear`;
    bar.style.width = '100%';
  }

  function updateDots(i) {
    document.querySelectorAll('.dot').forEach((d, idx) => {
      d.classList.toggle('active', idx === i);
    });
  }

  function goToNext() {
    const next = (current + 1) % slides.length;

    // Fade to black
    curtain.classList.add('closing');

    setTimeout(() => {
      slides[current].classList.remove('visible');
      slides[next].classList.add('visible');
      updateDots(next);
      setLabel(next);
      current = next;

      // Fade from black
      curtain.classList.remove('closing');
      curtain.classList.add('opening');

      setTimeout(() => {
        curtain.classList.remove('opening');
        startProgress(DURATIONS[current]);
        setTimeout(goToNext, DURATIONS[current]);
      }, FADE);

    }, FADE);
  }

  // Init
  setLabel(0);
  updateDots(0);
  startProgress(DURATIONS[0]);
  setTimeout(goToNext, DURATIONS[0]);
</script>

</body>
</html>
