<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>Slide Rotator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .slider {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .slide-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transform: translateX(100%);
      transition:
        transform 0.9s ease,
        opacity 0.9s ease;
      pointer-events: none;
      background: #000;
    }

    .slide-frame.active {
      opacity: 1;
      transform: translateX(0);
      z-index: 2;
    }

    .slide-frame.prev {
      opacity: 0;
      transform: translateX(-100%);
      z-index: 1;
    }

    .slide-frame.next {
      opacity: 0;
      transform: translateX(100%);
      z-index: 1;
    }

    .indicator {
      position: absolute;
      right: 24px;
      bottom: 20px;
      z-index: 10;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="slider">
    <iframe class="slide-frame active" src="slide1.html"></iframe>
    <iframe class="slide-frame next" src="slide2.html"></iframe>
    <div class="indicator" id="indicator">1 / 2</div>
  </div>

  <script>
    // Change this to whatever timing you want
    const ROTATE_EVERY_MS = 5000;

    const slides = Array.from(document.querySelectorAll('.slide-frame'));
    const indicator = document.getElementById('indicator');
    let current = 0;

    function updateSlides(nextIndex) {
      slides.forEach((slide, index) => {
        slide.classList.remove('active', 'prev', 'next');

        if (index === nextIndex) {
          slide.classList.add('active');
        } else if (index === current) {
          slide.classList.add('prev');
        } else {
          slide.classList.add('next');
        }
      });

      indicator.textContent = `${nextIndex + 1} / ${slides.length}`;
      current = nextIndex;
    }

    function goToNextSlide() {
      const nextIndex = (current + 1) % slides.length;
      updateSlides(nextIndex);
    }

    setInterval(goToNextSlide, ROTATE_EVERY_MS);
  </script>
</body>
</html>
