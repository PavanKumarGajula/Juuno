<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laptop Migration – Slide 4</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Sora', sans-serif; background: #020608; }
  .page { width: 1920px; height: 1080px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .bg-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 30%; filter: brightness(0.13) saturate(0.3); z-index: 0; }
  .overlay { position: absolute; inset: 0; z-index: 1; background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,212,232,0.05) 0%, transparent 65%), radial-gradient(ellipse 100% 50% at 50% 0%, rgba(0,0,0,0.95) 0%, transparent 60%), radial-gradient(ellipse 100% 50% at 50% 100%, rgba(0,0,0,0.98) 0%, transparent 60%), linear-gradient(180deg, rgba(2,6,8,0.6) 0%, rgba(2,6,8,0.05) 30%, rgba(2,6,8,0.05) 70%, rgba(2,6,8,0.95) 100%); }
  .top-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 20; background: linear-gradient(90deg, transparent 5%, #00D4E8 30%, #73F3FF 50%, #00D4E8 70%, transparent 95%); animation: shimmer 3s ease-in-out infinite; }
  @keyframes shimmer { 0%,100%{opacity:.8} 50%{opacity:1;filter:brightness(1.5)} }
  .corner { position: absolute; width: 22px; height: 22px; z-index: 10; }
  .corner.tl { top: 44px; left: 88px; border-top: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.tr { top: 44px; right: 88px; border-top: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }
  .corner.bl { bottom: 44px; left: 88px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.br { bottom: 44px; right: 88px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }
  canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .layout { position: relative; z-index: 10; width: 1640px; display: flex; align-items: center; justify-content: space-between; gap: 80px; }
  .illustration { flex: 0 0 580px; display: flex; align-items: center; justify-content: center; opacity: 0; animation: fadeUp 1s .2s cubic-bezier(.22,1,.36,1) forwards; }
  .illustration img { width: 580px; height: auto; filter: drop-shadow(0 0 40px rgba(0,212,232,0.15)); animation: floatIllus 5s ease-in-out infinite; }
  @keyframes floatIllus { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
  .right { flex: 1; display: flex; flex-direction: column; gap: 0; align-items: flex-start; }
  .eyebrow { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; opacity: 0; animation: fadeUp .8s .3s cubic-bezier(.22,1,.36,1) forwards; }
  .eyebrow-line { width: 36px; height: 1px; background: #00D4E8; opacity: .5; }
  .eyebrow-text { font-size: 13px; font-weight: 400; letter-spacing: .26em; text-transform: uppercase; color: rgba(0,212,232,.8); }
  .headline { font-size: 110px; font-weight: 900; line-height: .92; letter-spacing: -.04em; color: #fff; margin-bottom: 48px; opacity: 0; animation: fadeUp .95s .42s cubic-bezier(.22,1,.36,1) forwards; }
  .headline .accent { color: #00D4E8; display: block; }
  .info-blocks { display: flex; flex-direction: column; gap: 16px; width: 100%; }
  .info-block { display: flex; align-items: center; gap: 26px; padding: 26px 34px; border-radius: 16px; opacity: 0; }
  .info-block:nth-child(1) { animation: fadeUp .75s .55s ease forwards; background: rgba(0,212,232,.07); border: 1px solid rgba(0,212,232,.3); }
  .info-block:nth-child(2) { animation: fadeUp .75s .70s ease forwards; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); }
  .info-block:nth-child(3) { animation: fadeUp .75s .85s ease forwards; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); }
  .block-icon { font-size: 48px; line-height: 1; flex-shrink: 0; }
  .block-text { display: flex; flex-direction: column; gap: 4px; }
  .block-label { font-size: 11px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: rgba(0,212,232,.55); }
  .block-value { font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -.02em; line-height: 1.1; }
  .block-sub { font-size: 15px; font-weight: 300; color: rgba(255,255,255,.38); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
</style>

<script>

const cx = cv.getContext('2d');
cv.width = 1920; cv.height = 1080;
const pts = Array.from({length:45},()=>({ x:Math.random()*1920, y:Math.random()*1080, r:Math.random()*1.3+.3, vx:(Math.random()-.5)*.22, vy:(Math.random()-.5)*.22, a:Math.random()*.28+.04 }));
