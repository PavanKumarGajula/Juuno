<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laptop Migration – Slide 1</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Sora', sans-serif;
    background: #020608;
  }

  .page {
    width: 1920px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── LENOVO THINKPAD BACKGROUND ── */
  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 40%;
    filter: brightness(0.18) saturate(0.4);
    z-index: 0;
  }

  .overlay {
    position: absolute; inset: 0; z-index: 1;
    background:
      radial-gradient(ellipse 80% 70% at 50% 55%, rgba(0,212,232,0.04) 0%, transparent 65%),
      radial-gradient(ellipse 100% 50% at 50% 0%,   rgba(0,0,0,0.92) 0%, transparent 60%),
      radial-gradient(ellipse 100% 50% at 50% 100%, rgba(0,0,0,0.98) 0%, transparent 60%),
      linear-gradient(180deg, rgba(2,6,8,0.5) 0%, rgba(2,6,8,0.05) 30%, rgba(2,6,8,0.05) 70%, rgba(2,6,8,0.92) 100%);
  }

  /* ── TOP ACCENT LINE ── */
  .top-line {
    position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 20;
    background: linear-gradient(90deg, transparent 5%, #00D4E8 30%, #73F3FF 50%, #00D4E8 70%, transparent 95%);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:.8} 50%{opacity:1;filter:brightness(1.5)} }

  /* Corner marks */
  .corner { position: absolute; width: 22px; height: 22px; z-index: 10; }
  .corner.tl { top: 44px; left: 88px; border-top: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.tr { top: 44px; right: 88px; border-top: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }
  .corner.bl { bottom: 44px; left: 88px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-left: 1.5px solid rgba(0,212,232,.4); }
  .corner.br { bottom: 44px; right: 88px; border-bottom: 1.5px solid rgba(0,212,232,.4); border-right: 1.5px solid rgba(0,212,232,.4); }

  /* ── PARTICLES ── */
  canvas { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

  /* ── FULL PAGE COLUMN ── */
  .col {
    position: relative; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 1740px;
    gap: 0;
  }

  /* ── FLYING ICONS STRIP ── */
  .icon-strip {
    position: relative;
    width: 100%;
    height: 72px;
    margin-bottom: 52px;
    overflow: hidden;
  }

  /* Fade edges of strip */
  .icon-strip::before, .icon-strip::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 160px;
    z-index: 5;
  }
  .icon-strip::before { left: 0;  background: linear-gradient(90deg, rgba(2,6,8,1), transparent); }
  .icon-strip::after  { right: 0; background: linear-gradient(-90deg, rgba(2,6,8,1), transparent); }

  /* Dashed track */
  .strip-track {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    transform: translateY(-50%);
    background: repeating-linear-gradient(90deg,
      rgba(0,212,232,.2) 0px, rgba(0,212,232,.2) 10px,
      transparent 10px, transparent 22px
    );
  }

  /* Individual flying item */
  .fly-item {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    opacity: 0;
    will-change: left, opacity;
  }

  .fly-icon-el {
    font-size: 28px;
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(0,212,232,0.7));
  }

  .fly-at {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: #00D4E8;
    text-shadow: 0 0 12px rgba(0,212,232,0.8);
    line-height: 1;
  }

  .fly-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(0,212,232,.5);
  }

  /* ── EYEBROW ── */
  .eyebrow {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 22px;
    opacity: 0; animation: fadeUp .8s .3s cubic-bezier(.22,1,.36,1) forwards;
  }
  .eyebrow-line { width: 36px; height: 1px; background: #00D4E8; opacity: .5; }
  .eyebrow-text { font-size: 13px; font-weight: 400; letter-spacing: .26em; text-transform: uppercase; color: rgba(0,212,232,.8); }

  /* ── HEADLINE ── */
  .headline {
    font-size: 120px;
    font-weight: 900;
    line-height: .95;
    letter-spacing: -.04em;
    color: #fff;
    text-align: center;
    margin-bottom: 28px;
    opacity: 0; animation: fadeUp 1s .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  .headline .accent { color: #00D4E8; }

  /* ── SUBTEXT ── */
  .subtext {
    font-size: 24px;
    font-weight: 300;
    line-height: 1.55;
    color: rgba(255,255,255,.6);
    text-align: center;
    max-width: 920px;
    margin-bottom: 52px;
    opacity: 0; animation: fadeUp .85s .72s cubic-bezier(.22,1,.36,1) forwards;
  }
  .subtext strong { color: rgba(255,255,255,.92); font-weight: 700; }

  /* ── DOMAIN ROW ── */
  .domain-row {
    display: flex; align-items: center; gap: 24px;
    margin-bottom: 56px;
    opacity: 0; animation: fadeUp .8s .9s ease forwards;
  }
  .domain-chip {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    padding: 18px 36px; border-radius: 12px;
  }
  .domain-chip.old {
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
  }
  .domain-chip.new {
    background: rgba(0,212,232,.07);
    border: 1px solid rgba(0,212,232,.35);
    box-shadow: 0 0 40px rgba(0,212,232,.08), inset 0 0 20px rgba(0,212,232,.03);
  }
  .chip-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase;
  }
  .domain-chip.old .chip-label { color: rgba(255,255,255,.28); }
  .domain-chip.new .chip-label { color: rgba(0,212,232,.65); }
  .chip-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px; font-weight: 700;
  }
  .domain-chip.old .chip-val { color: rgba(255,255,255,.4); }
  .domain-chip.new .chip-val { color: #00D4E8; }

  .domain-arrow {
    font-size: 32px; color: rgba(0,212,232,.45);
    animation: nudge 1.8s ease-in-out infinite;
  }
  @keyframes nudge { 0%,100%{transform:translateX(0);opacity:.45} 50%{transform:translateX(8px);opacity:1} }

  /* ── DATE / TIME ROW ── */
  .datetime-row {
    display: flex; align-items: center; gap: 0;
    opacity: 0; animation: fadeUp .8s 1.1s ease forwards;
  }

  .dt-chip {
    display: flex; align-items: center; gap: 14px;
    padding: 20px 44px;
    border: 1px solid rgba(0,212,232,.2);
    background: rgba(0,212,232,.05);
  }
  .dt-chip:first-child { border-radius: 14px 0 0 14px; border-right: none; }
  .dt-chip:last-child  { border-radius: 0 14px 14px 0; border-left: 1px solid rgba(0,212,232,.1); }

  .dt-icon { font-size: 34px; line-height: 1; }

  .dt-text { display: flex; flex-direction: column; gap: 2px; }
  .dt-label { font-size: 10px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: rgba(0,212,232,.55); }
  .dt-value { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -.01em; }

  .dt-divider {
    width: 1px; height: 72px;
    background: rgba(0,212,232,.2);
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="page">

  <!-- Lenovo ThinkPad background -->
  <img class="bg-photo"
    src="https://images.unsplash.com/photo-1593642632559-0c6d3fc62b89?w=1920&q=90"
    alt="Lenovo ThinkPad"/>
  <div class="overlay"></div>

  <!-- Frame elements -->
  <div class="top-line"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <!-- Particles -->
  <canvas id="particles"></canvas>

  <!-- MAIN COLUMN -->
  <div class="col">

    <!-- FLYING ICONS STRIP -->
    <div class="icon-strip">
      <div class="strip-track"></div>
      <div id="flyZone"></div>
    </div>

    <!-- EYEBROW -->
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <span class="eyebrow-text">PwrQ Branch &nbsp;·&nbsp; Company-Wide IT Update</span>
      <div class="eyebrow-line"></div>
    </div>

    <!-- HEADLINE -->
    <h1 class="headline">Account <span class="accent">Migration.</span></h1>

    <!-- SUBTEXT -->
    <p class="subtext">
      Your laptop stays. Your domain changes.<br>
      All <strong>PwrQ</strong> laptops are moving to the <strong>Forgent Power</strong> Microsoft 365 tenant.
    </p>

    <!-- DOMAIN CHIPS -->
    <div class="domain-row">
      <div class="domain-chip old">
        <span class="chip-label">Current Domain</span>
        <span class="chip-val">@pwrq.com</span>
      </div>
      <div class="domain-arrow">⟶</div>
      <div class="domain-chip new">
        <span class="chip-label">New Domain</span>
        <span class="chip-val">@forgentpower.com</span>
      </div>
    </div>

    <!-- DATE / TIME -->
    <div class="datetime-row">
      <div class="dt-chip">
        <div class="dt-icon">📅</div>
        <div class="dt-text">
          <span class="dt-label">Migration Dates</span>
          <span class="dt-value">April 6 – 9</span>
        </div>
      </div>
      <div class="dt-divider"></div>
      <div class="dt-chip">
        <div class="dt-icon">🕖</div>
        <div class="dt-text">
          <span class="dt-label">Starts Each Night</span>
          <span class="dt-value">7:00 PM</span>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
/* ── PARTICLES ── */
const cv = document.getElementById('particles');
const cx = cv.getContext('2d');
cv.width = 1920; cv.height = 1080;
const pts = Array.from({length:50},()=>({
  x:Math.random()*1920, y:Math.random()*1080,
  r:Math.random()*1.3+.3,
  vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
  a:Math.random()*.3+.05
}));
(function draw(){
  cx.clearRect(0,0,1920,1080);
  pts.forEach(p=>{
    cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(0,212,232,${p.a})`; cx.fill();
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=1920; if(p.x>1920)p.x=0;
    if(p.y<0)p.y=1080; if(p.y>1080)p.y=0;
  });
  requestAnimationFrame(draw);
})();

/* ── FLYING ICONS ── */
const zone = document.getElementById('flyZone');
const STRIP_W = 1740;

const items = [
  { type:'at' },
  { type:'icon', val:'📁' },
  { type:'at' },
  { type:'icon', val:'📄' },
  { type:'at' },
  { type:'icon', val:'📅' },
  { type:'icon', val:'📁' },
  { type:'at' },
  { type:'icon', val:'📧' },
  { type:'at' },
  { type:'icon', val:'🗂️' },
];

const vertOffsets = [-18, 0, 18];
let idx = 0;

function launch() {
  const def = items[idx % items.length]; idx++;

  const wrap = document.createElement('div');
  wrap.className = 'fly-item';
  wrap.style.top = `calc(50% + ${vertOffsets[Math.floor(Math.random()*vertOffsets.length)]}px)`;

  if (def.type === 'at') {
    const a = document.createElement('div');
    a.className = 'fly-at'; a.textContent = '@';
    const lb = document.createElement('div');
    lb.className = 'fly-label'; lb.textContent = 'email';
    wrap.appendChild(a); wrap.appendChild(lb);
  } else {
    const ic = document.createElement('div');
    ic.className = 'fly-icon-el'; ic.textContent = def.val;
    const lb = document.createElement('div');
    lb.className = 'fly-label';
    const map = {'📁':'files','📄':'docs','📅':'calendar','📧':'mail','🗂️':'folders'};
    lb.textContent = map[def.val] || 'data';
    wrap.appendChild(ic); wrap.appendChild(lb);
  }

  zone.appendChild(wrap);

  const dur = 2200 + Math.random() * 600;
  let start = null;

  function tick(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / dur, 1);
    const eased = p < .5 ? 2*p*p : 1 - Math.pow(-2*p+2,2)/2;

    wrap.style.left = (eased * STRIP_W) + 'px';
    wrap.style.opacity = p < .1
      ? (p/.1).toString()
      : p > .88
        ? ((1-p)/.12).toString()
        : '1';

    const bob = Math.sin(p * Math.PI * 3) * 6;
    wrap.style.transform = `translateY(calc(-50% + ${bob}px))`;

    if (p < 1) requestAnimationFrame(tick);
    else zone.removeChild(wrap);
  }

  requestAnimationFrame(tick);
}

setTimeout(()=>{ launch(); setInterval(launch, 550); }, 800);
</script>
</body>
</html>
